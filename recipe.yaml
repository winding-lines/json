# rattler-build recipe for json
# This builds the json package as a .mojopkg for distribution

context:
  name: json
  version: "0.1.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  path: .

build:
  script:
    - mojo --version
    # Build the simdjson FFI wrapper
    - mkdir -p $PREFIX/lib
    - $CXX -O3 -std=c++17 -fPIC -DNDEBUG -shared -o $PREFIX/lib/libsimdjson_wrapper.so json/cpu/simdjson_ffi/simdjson_wrapper.cpp -I$PREFIX/include -L$PREFIX/lib -lsimdjson
    # Build the Mojo package
    - mojo package json -o $PREFIX/lib/mojo/json.mojopkg

requirements:
  build:
    - mojo-compiler ==0.26.3.0.dev2026041305
    - ${{ compiler('cxx') }}
  host:
    - mojo-compiler ==0.26.3.0.dev2026041305
    - simdjson >=4.2.4,<5
  run:
    - simdjson >=4.2.4,<5

about:
  homepage: https://github.com/ehsanmok/json
  license: Apache-2.0
  summary: High-performance JSON library for Mojo with CPU and GPU support
  description: |
    json is a high-performance JSON parsing library for Mojo.
    Features include:
    - Fast CPU parsing via simdjson FFI
    - GPU-accelerated parsing for large files
    - Full JSON compliance (RFC 8259)
    - JSONPath queries
    - JSON Schema validation
    - JSON Patch support
